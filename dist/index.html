<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CBAS 報價及發行資訊</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">CBAS Monitor</p>
        <h1>CBAS 報價及發行資訊</h1>
        <p id="subtitle" class="subtitle">讀取資料中。</p>
      </div>
      <div class="header-actions">
        <button id="downloadJson" type="button" title="下載 JSON">JSON</button>
        <button id="downloadCsv" type="button" title="下載目前報價表">CSV</button>
      </div>
    </header>

    <main>
      <section class="metrics" id="metrics"></section>

      <section class="toolbar" aria-label="查詢工具">
        <label>
          <span>搜尋</span>
          <input id="searchInput" type="search" placeholder="代碼、名稱、券商、日期" />
        </label>
        <label>
          <span>資料類型</span>
          <select id="viewSelect">
            <option value="quotes">券商報價</option>
            <option value="primary_market">初級市場</option>
            <option value="events">到期／贖回提醒</option>
          </select>
        </label>
        <label>
          <span>來源檔</span>
          <select id="sourceSelect">
            <option value="">全部來源</option>
          </select>
        </label>
        <label>
          <span>排序</span>
          <select id="sortSelect">
            <option value="code">代碼</option>
            <option value="premium">權利金</option>
            <option value="date">日期</option>
            <option value="score">觀察分數</option>
          </select>
        </label>
      </section>

      <section class="focus-layout">
        <article class="watchlist">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Focus</p>
              <h2>優先觀察標的</h2>
            </div>
            <span id="watchlistCount"></span>
          </div>
          <div id="watchlistRows" class="watchlist-rows"></div>
        </article>

        <aside class="source-status">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Sources</p>
              <h2>來源狀態</h2>
            </div>
          </div>
          <div id="sourceRows" class="source-rows"></div>
          <div id="warningRows" class="warning-rows"></div>
        </aside>
      </section>

      <section class="table-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow" id="tableEyebrow">Quotes</p>
            <h2 id="tableTitle">券商報價</h2>
          </div>
          <span id="rowCount"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./data/cbas-latest.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
